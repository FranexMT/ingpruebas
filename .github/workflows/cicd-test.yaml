name: Python Application CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ejecutar pruebas
      run: |
        python -m pytest -v --cov=. --cov-report=html --html=report.html
    - name: Build Clase
      run: |
        mkdir build
        cp calculadora.py build/
    - name: Build Reporte COV
      run: |
        cp -r htmlcov build/
    - name: Build Reporte HTML
      run: |
        cp -r assets build/
        cp -r report.html build/
    - name: Build Artefacto ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Artefacto-Probado
        path: build/
